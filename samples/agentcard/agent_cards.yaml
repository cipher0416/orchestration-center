agents:
  - name: "RAN Energy Saving Agent"
    description_zh: "负责RAN能效优化的自主闭环运行，包括意图探索、意图实现、效果评估与报告。"
    description_en: "Responsible for autonomous closed-loop RAN energy efficiency optimization, including intent exploration, intent fulfillment, effect evaluation and reporting."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "ran-es-intent-exploration"
        name: "RAN ES Intent Exploration"
        description_zh: "评估并确定指定RAN ES意图目标的最佳可能性，考虑当前资源状况和系统能力。"
        description_en: "Evaluate and determine the best possible values for specified RAN ES intent targets, considering current resource conditions and system capabilities."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "ran-es-intent-lifecycle-management"
        name: "RAN ES Intent Lifecycle Management"
        description_zh: "管理RAN节能意图的生命周期，包括创建、修改、删除、激活、去激活意图，并执行数据采集、分析、解决方案制定与配置。"
        description_en: "Manage the lifecycle of RAN energy-saving intents including creation, modification, deletion, activation, deactivation, and perform data collection, analysis, solution formulation and configuration."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "ran-es-intent-reporting"
        name: "RAN ES Intent Reporting"
        description_zh: "提供意图报告查询、订阅、通知功能，报告意图实现状态、达成值、推荐值及配置修改信息。"
        description_en: "Provide intent report query, subscription, and notification capabilities, reporting intent fulfillment status, achieved values, recommended values, and configuration changes."
        tags: [ "wireless","energy-saving","reporting" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8899"

  - name: "Energy Saving Intent Agent"
    description_zh: "负责设置节能意图，与RAN能效优化智能体交互，进行意图预评估、意图生成与交付，并对节能效果进行评估与调整。"
    description_en: "Responsible for setting energy-saving intents, interacting with RAN energy efficiency optimization agents, performing intent pre-assessment, intent generation and delivery, and evaluating and adjusting energy-saving effects."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "intent-exploration-request"
        name: "Intent Exploration Request"
        description_zh: "发起RAN ES意图探索请求，并获取指定意图目标的最佳可能值。"
        description_en: "Initiate RAN ES intent exploration request and obtain the best possible values for specified intent targets."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "intent-generation"
        name: "Intent Generation"
        description_zh: "根据探索报告和业务需求生成RAN节能意图内容，包括不同时段、不同RAT的吞吐量和节能目标。"
        description_en: "Generate RAN energy-saving intent content based on exploration reports and business requirements, including throughput and energy-saving targets for different time periods and RATs."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "intent-delivery"
        name: "Intent Delivery"
        description_zh: "将生成的节能意图交付给RAN能效优化智能体，并管理意图生命周期（调用意图生命周期管理接口）。"
        description_en: "Deliver generated energy-saving intents to RAN energy efficiency optimization agents and manage intent lifecycle (invoke intent lifecycle management interfaces)."
        tags: [ "wireless","energy-saving","intent" ]
      - id: "effect-evaluation"
        name: "Effect Evaluation"
        description_zh: "评估不同RAN域的节能效果，根据效果调整意图。"
        description_en: "Evaluate energy-saving effects across different RAN domains and adjust intents based on results."
        tags: [ "wireless","energy-saving","evaluation" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8900"

  - name: "Live Streaming Agent"
    description_zh: "负责赛事需求的解析与监控。"
    description_en: "Responsible for parsing and monitoring live event requirements."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "info-parsing"
        name: "Event Info Parsing"
        description_zh: "提取赛事的路线与业务需求"
        description_en: "Extract event route and business requirements"
        tags: [ "live", "info" ]
      - id: "kqi-monitoring"
        name: "KQI Monitoring"
        description_zh: "实时反馈保障任务关键质量指标及任务状态"
        description_en: "Provide real-time feedback on key quality indicators and assurance task status"
        tags: [ "live", "monitoring" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8901"

  - name: "Assurance Agent"
    description_zh: "负责保障策略及其恢复策略的生成。"
    description_en: "Responsible for generating assurance strategies and their corresponding recovery strategies."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "strategy-generation"
        name: "Strategy Generation"
        description_zh: "将赛事保障需求转换为网络需求，包含带宽上下行要求等"
        description_en: "Convert event assurance requirements into network requirements, including uplink/downlink bandwidth requirements"
        tags: [ "assurance", "strategy" ]
      - id: "recovery-delivery"
        name: "Recovery Delivery"
        description_zh: "恢复保障前网络配置"
        description_en: "Restore network configuration to pre-assurance state"
        tags: [ "assurance", "recovery" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8902"

  - name: "RAN Agent"
    description_zh: "负责无线网络的分析、规划与策略执行。"
    description_en: "Responsible for radio access network analysis, planning and policy execution."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "analysis-eval"
        name: "Analysis and Evaluation"
        description_zh: "分析网络负载现状"
        description_en: "Analyze current network load status"
        tags: [ "ran", "analysis" ]
      - id: "plan-design"
        name: "Plan Design"
        description_zh: "根据网络负载现状及网络保障需求规划网络策略方案"
        description_en: "Plan network strategy solutions based on current network load and assurance requirements"
        tags: [ "ran", "plan" ]
      - id: "net-exec"
        name: "Network Policy Execution"
        description_zh: "执行或恢复网络策略"
        description_en: "Execute or restore network policies"
        tags: [ "ran", "exec" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8903"

  - name: "Transport Workbench Agent"
    description_zh: "负责向不同地市的SPN故障处理Agent下发专线故障诊断指令，并汇总分析诊断结果，生成报告。"
    description_en: "Responsible for dispatching leased-line fault diagnosis instructions to SPN fault handling agents in different cities, aggregating and analyzing diagnosis results, and generating reports."
    provider:
      organization: "Huawei"
      url: ""
    version: "0.1.0"
    iconUrl: ""
    skills:
      - id: "dispatch-diagnosis"
        name: "Dispatch Diagnosis"
        description_zh: "向多个地市SPN故障处理Agent同时下发专线故障诊断指令"
        description_en: "Simultaneously dispatch leased-line fault diagnosis instructions to SPN fault handling agents in multiple cities"
        tags: [ "dispatch", "diagnosis" ]
      - id: "aggregate-analysis"
        name: "Aggregate Analysis"
        description_zh: "收集并汇总各地市SPN Agent的诊断结果，进行综合分析并生成报告"
        description_en: "Collect and aggregate diagnosis results from all city SPN agents, perform comprehensive analysis and generate report"
        tags: [ "aggregate", "analysis" ]
    capabilities:
      pushNotifications: false
      streaming: false
    defaultInputModes: [ "text" ]
    defaultOutputModes: [ "text" ]
    supportedInterfaces:
      - protocolBinding: "HTTP+JSON"
        protocolVersion: "1.0"
        url: "http://127.0.0.1:8904"

